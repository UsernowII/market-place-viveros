<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./images/logo2.png">
    <title>Market-Place Viveros</title>

    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />

    <!-- font awesome cdn link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <!-- custom css file link  -->
    <link rel="stylesheet" href="style.css">

</head>
<body>
    
<!-- header section starts  -->

<header>


    <div class="header-2">

        <div class="nav__logo">
            <figure >
                <a href="./index.html"><img src="./images/logo2.png" alt=""></a>
            </figure>
            <h1 class="logo__title">Market Place Viveros</h1>
        </div>
            
        <form action="" class="search-bar-container">
            <input type="search" id="search-bar" placeholder="Buscar...">
            <label for="search-bar" class="fas fa-search"></label>
        </form>

    </div>

    <div class="header-3">

        <div id="menu-bar" class="fas fa-bars"></div>

        <nav class="navbar">
            <a href="./categories.html">Categorias</a>
            <a href="#product">Ofertas</a>
            <a href="#contact">Contactanos</a>
        </nav>

        <div class="icons">
            <a href="./register.html">Registrarse</a>
            <a href="./car.html" class="fas fa-shopping-cart"></a>
            <a href="#" class="fas fa-heart"></a>
            <a href="./login.html" class="fas fa-user-circle"></a>
        </div>

    </div>

</header>

<!-- header section ends -->

<!-- home section starts  -->

<section class="home" id="home">

    <div class="swiper-container home-slider">

        <div class="swiper-wrapper">

            <div class="swiper-slide">
                <div class="box" style="background: url(images/slider3.jpg);">
                    <div class="content">
                        <span>hasta 75% off</span>
                        <h3>oferta especial</h3>
                        <a href="#" class="btn">comprar ahora!</a>
                    </div>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="box" style="background: url(images/slider2.jpg);">
                    <div class="content">
                        <span>hasta 45% off</span>
                        <h3>decora tu hogar</h3>
                        <a href="#" class="btn">comprar ahora!</a>
                    </div>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="box" style="background: url(images/slider1.jpg);">
                    <div class="content">
                        <span>hasta 65% off</span>
                        <h3>las plantas hacen personas felices</h3>
                        <a href="#" class="btn">Comprar ahora!</a>
                    </div>
                </div>
            </div>

        </div>

        <div class="swiper-pagination"></div>

    </div>

</section>

<!-- home section ends -->

<!-- banner section starts  -->
